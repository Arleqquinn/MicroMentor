name: micro_mentor
description: "MicroMentor"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.1.1
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  provider: ^6.1.5
  google_fonts: ^6.3.2
  shared_preferences: ^2.5.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/content.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/MicroMentor_logo.png"
  min_sdk_android: 21

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/assets/icon/MicroMentor_logo.png"